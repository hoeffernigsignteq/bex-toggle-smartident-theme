name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install dependencies without lifecycle scripts first. If postinstall runs
      # immediately, toolchain binaries may be missing due npm optional-deps issues.
      - name: Install Dependencies (without scripts)
        run: npm install --ignore-scripts

      # Explicitly install Linux-native optional binaries used by the toolchain.
      # This is the common CI workaround for npm optional dependency resolution bugs.
      - name: Install Linux Native Optional Dependencies
        run: |
          npm install --no-save \
            @rollup/rollup-linux-x64-gnu \
            lightningcss-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @esbuild/linux-x64 \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64

      - name: Run Postinstall (WXT Prepare)
        run: npm run postinstall

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm run test

      - name: Build (All Targets)
        run: npm run build

      - name: Package Chrome
        run: npm run zip:chrome

      - name: Package Firefox
        run: npm run zip:firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*-chrome.zip
            .output/*-firefox.zip

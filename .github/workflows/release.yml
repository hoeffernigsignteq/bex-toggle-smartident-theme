name: Release Extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # We intentionally use `npm install` (not `npm ci`) in CI here because
      # this project depends on optional native packages (esbuild/rollup/lightningcss),
      # and `npm ci` has intermittently skipped required Linux optional binaries.
      - name: Install Dependencies (npm install for optional native binaries)
        run: npm install

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm run test

      - name: Build (All Targets)
        run: npm run build

      - name: Package Chrome
        run: npm run zip:chrome

      - name: Package Firefox
        run: npm run zip:firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            .output/*-chrome.zip
            .output/*-firefox.zip
